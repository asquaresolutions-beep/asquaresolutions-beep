<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="A Square Solutions — Building AI-powered products, digital systems, and web experiences">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0e1a33"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280"/>
    <path d="M160 0 V320 M320 0 V320 M480 0 V320 M640 0 V320 M800 0 V320 M960 0 V320 M1120 0 V320"/>
  </g>
  <!-- glow -->
  <circle cx="1080" cy="60" r="220" fill="#6366f1" fill-opacity="0.12"/>
  <circle cx="180" cy="300" r="200" fill="#38bdf8" fill-opacity="0.10"/>

  <!-- logo mark: A² square -->
  <g transform="translate(80,96)">
    <rect width="128" height="128" rx="26" fill="url(#logo)"/>
    <text x="64" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800" fill="#0b1220" text-anchor="middle">A</text>
    <text x="100" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#0b1220" text-anchor="middle">2</text>
  </g>

  <!-- wordmark -->
  <text x="248" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="800" fill="#f8fafc">A Square Solutions</text>
  <text x="250" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="500" fill="#94a3b8">Building AI-powered products, digital systems, and web experiences.</text>

  <!-- accent underline -->
  <rect x="250" y="214" width="430" height="4" rx="2" fill="url(#accent)"/>

  <!-- product chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    <g transform="translate(250,250)">
      <rect width="150" height="44" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.35"/>
      <text x="75" y="29" fill="#bae6fd" text-anchor="middle">ScamCheck</text>
    </g>
    <g transform="translate(414,250)">
      <rect width="140" height="44" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#6366f1" stroke-opacity="0.35"/>
      <text x="70" y="29" fill="#c7d2fe" text-anchor="middle">TrustSeal</text>
    </g>
    <g transform="translate(568,250)">
      <rect width="200" height="44" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#22d3ee" stroke-opacity="0.30"/>
      <text x="100" y="29" fill="#a5f3fc" text-anchor="middle">AI Execution Lab</text>
    </g>
    <g transform="translate(782,250)">
      <rect width="130" height="44" rx="22" fill="#ffffff" fill-opacity="0.05" stroke="#818cf8" stroke-opacity="0.30"/>
      <text x="65" y="29" fill="#ddd6fe" text-anchor="middle">ASS Tools</text>
    </g>
  </g>

  <!-- url -->
  <text x="1200" y="296" font-family="Consolas, monospace" font-size="18" fill="#64748b" text-anchor="end">asquaresolution.com</text>
</svg>
